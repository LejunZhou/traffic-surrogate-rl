# Diagnostic Scenario 1: Free-flow baseline
# Very low mainline demand, ramp closed (run with --ramp-rate 0.0).
#
# Expected behaviour:
#   density   : uniform ≈ 4.2 veh/km across all 20 detectors and all 120 time
#               steps  (q/v = 500/120 ≈ 4.2 veh/km)
#   speed     : uniform ≈ 120 km/h everywhere — no vehicle ever needs to brake
#   flow      : uniform ≈ 500 veh/hr at every detector
#   teleports : 0 — ramp is closed, no merge conflict at all
#   bottleneck: none — density should be flat across space and time
#
# Purpose: validates that SUMO and the density/speed/flow extraction produce
# the correct fundamental-diagram values in the simplest possible case.
# Any systematic detector bias or formula error will show up as a deviation
# from the flat expected values.

network:
  highway_length_m: 2000.0
  ramp_position_m: 500.0
  ramp_length_m: 500.0
  speed_limit_mps: 33.33
  ramp_speed_limit_mps: 27.78

simulation:
  duration_s: 3600
  step_length_s: 1.0
  dt_ctrl_s: 30
  seed: 42
  sumo_binary: "sumo"

demand:
  mainline_demand_vph: 500    # 500 veh/hr ≈ 24% of IDM capacity (≈ 2100 veh/hr)
  ramp_demand_vph: 600        # ignored when ramp_rate = 0.0
  demand_profile: "free_flow_diagnostic"

vehicle:
  idm_tau_s: 1.5

detectors:
  n_detectors: 20
  spacing_m: 100.0
  vehicle_length_m: 5.0

output:
  raw_dir: "data/raw"
  network_dir: "data/raw/network"
